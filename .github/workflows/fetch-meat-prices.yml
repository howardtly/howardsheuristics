name: Fetch Meat Prices

on:
  schedule:
    # Mon-Fri at 3:30 PM ET (after PM report ~2:50 PM ET)
    - cron: '30 20 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch meat prices
        env:
          AMS_API_KEY: ${{ secrets.AMS_API_KEY }}
        run: python commodity-markets-deploy_2/scripts/fetch_meat_prices.py

      - name: Commit and push
        run: |
          cd commodity-markets-deploy_2
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update meat prices $(date -u +%Y-%m-%d)"
            git pull --rebase origin main
            git push
          fi
