name: Discover Poultry

on:
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Locate and run discovery script
        env:
          AMS_API_KEY: ${{ secrets.AMS_API_KEY }}
        run: |
          echo "=== Repo structure (top 3 levels) ==="
          find . -maxdepth 3 -type d -not -path "./.git*" | sort
          echo ""
          echo "=== Looking for discover_poultry.py ==="
          SCRIPT_PATH=$(find . -name "discover_poultry.py" -not -path "./.git/*" | head -1)
          if [ -z "$SCRIPT_PATH" ]; then
            echo "ERROR: discover_poultry.py not found anywhere in repo"
            exit 1
          fi
          SCRIPT_DIR=$(dirname "$SCRIPT_PATH")
          echo "Found script at: $SCRIPT_PATH"
          echo "Running from: $SCRIPT_DIR"
          cd "$SCRIPT_DIR"
          python3 discover_poultry.py

      - name: Upload discovery output
        uses: actions/upload-artifact@v4
        with:
          name: poultry-discovery
          path: |
            **/poultry_summary.txt
            **/poultry_raw_*.json
          if-no-files-found: warn
          retention-days: 7
