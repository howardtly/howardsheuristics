name: Fetch Export Sales (Weekly)
on:
  schedule:
    - cron: '30 12 * * 4'  # Thursdays 8:30 AM ET (USDA release time)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Fetch export sales
        env:
          FAS_ESR_API_KEY: ${{ secrets.FAS_ESR_API_KEY }}
        run: python commodity-markets-deploy_2/scripts/fetch_export_sales.py
      - name: Commit
        run: |
          cd commodity-markets-deploy_2
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/export_sales.json
          git diff --cached --quiet || git commit -m "Update export sales $(date -u +%Y-%m-%d)"
          git push
