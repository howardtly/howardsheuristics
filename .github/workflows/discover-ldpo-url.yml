name: Discover LDPO URL

on:
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install openpyxl
      - name: Discover and test LDPO URL
        run: python commodity-markets-deploy_2/scripts/fetch_livestock_outlook.py
