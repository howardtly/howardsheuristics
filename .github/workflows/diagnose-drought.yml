name: Diagnose Drought Site
on:
  workflow_dispatch:
jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Fetch drought data
        run: python commodity-markets-deploy_2/scripts/fetch_drought.py
        env:
          OUTPUT_DIR: commodity-markets-deploy_2/data
