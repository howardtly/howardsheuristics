name: Fetch Poultry Prices
on:
  schedule:
    # Fri at 3 PM ET (after USDA poultry reports publish ~11 AM-1 PM CT)
    - cron: '0 19 * * 5'
    # Fri at 6 PM ET (safety net for late publishes)
    - cron: '0 22 * * 5'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Fetch poultry prices
        env:
          MMN_API_KEY: ${{ secrets.MMN_API_KEY }}
        run: python commodity-markets-deploy_2/scripts/fetch_poultry_prices.py
      - name: Commit and push
        run: |
          cd commodity-markets-deploy_2
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update poultry prices $(date -u +%Y-%m-%d)"
            git pull --rebase origin main
            git push
          fi
