<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Commodity Markets</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-text-primary: #1a1a1a;
      --color-text-secondary: #555;
      --color-text-tertiary: #999;
      --color-text-info: #1e40af;
      --color-background-primary: #ffffff;
      --color-background-secondary: #f5f5f5;
      --color-background-info: rgba(59,130,246,0.04);
      --color-border-primary: #d4d4d4;
      --color-border-secondary: #e0e0e0;
      --color-border-tertiary: #eee;
      --border-radius-md: 8px;
      --border-radius-lg: 12px;
      --font-mono: "SF Mono", "Fira Code", "Fira Mono", Menlo, Consolas, monospace;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #ffffff;
      color: #1a1a1a;
      -webkit-font-smoothing: antialiased;
    }
    #root { min-height: 100vh; }
    #loading { display: flex; align-items: center; justify-content: center; height: 100vh; font-size: 14px; color: #999; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
</head>
<body>
  <div id="root"><div id="loading">Loading dashboard...</div></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script>
    fetch('app.jsx?v=32')
      .then(function(r) { return r.text(); })
      .then(function(jsx) {
        var js = Babel.transform(jsx, { presets: ['react'] }).code;
        var fn = new Function('React', 'ReactDOM', 'useState', 'useEffect', 'useCallback', 'useRef', js + '; return App;');
        var App = fn(React, ReactDOM, React.useState, React.useEffect, React.useCallback, React.useRef);
        var root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
      })
      .catch(function(err) {
        document.getElementById('loading').textContent = 'Error: ' + err.message;
        console.error(err);
      });
  </script>
</body>
</html>
