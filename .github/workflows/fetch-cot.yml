name: Fetch Export Inspections (Weekly)
on:
  schedule:
    - cron: '0 18 * * 1'  # Mondays 6PM UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Fetch export inspections
        run: python commodity-markets-deploy_2/scripts/fetch_export_inspections.py
      - name: Commit
        run: |
          cd commodity-markets-deploy_2
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/export_inspections.json
          git diff --cached --quiet || git commit -m "Update export inspections $(date -u +%Y-%m-%d)"
          git push
