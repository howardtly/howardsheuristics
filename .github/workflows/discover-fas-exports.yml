name: Discover FAS Export Sales API
on:
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Explore FAS API
        run: python commodity-markets-deploy_2/scripts/discover_fas_exports.py
