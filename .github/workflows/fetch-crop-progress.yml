name: Fetch Crop Progress (Weekly)
on:
  schedule:
    - cron: '0 20 * * 1'  # Mondays 4:00 PM ET (USDA release time)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Fetch crop progress data
        env:
          NASS_API_KEY: ${{ secrets.NASS_API_KEY }}
        run: python commodity-markets-deploy_2/scripts/fetch_crop_progress.py
      - name: Commit
        run: |
          cd commodity-markets-deploy_2
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Update crop progress data $(date -u +%Y-%m-%d)"
          git push
