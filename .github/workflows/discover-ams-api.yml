name: Discover AMS API

on:
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Discover AMS MARS API
        env:
          AMS_API_KEY: ${{ secrets.AMS_API_KEY }}
        run: python commodity-markets-deploy_2/scripts/discover_ams_api.py
