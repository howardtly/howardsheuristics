name: Discover Poultry

on:
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - name: Decode and write discovery script
        run: |
          mkdir -p work
          echo "" | base64 -d > work/discover_poultry.py
          echo "Wrote work/discover_poultry.py ($(wc -c < work/discover_poultry.py) bytes)"
          python3 -c "import ast; ast.parse(open('work/discover_poultry.py').read()); print('Syntax OK')"

      - name: Run discovery script
        env:
          MMN_API_KEY: ${{ secrets.MMN_API_KEY }}
        run: |
          cd work
          python3 -u discover_poultry.py 2>&1
          echo ""
          echo "----- Files produced -----"
          ls -la

      - name: Upload discovery output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: poultry-discovery
          path: |
            work/poultry_summary.txt
            work/poultry_raw_*.json
          if-no-files-found: warn
          retention-days: 7
