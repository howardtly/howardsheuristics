name: Fetch Crop Progress (Weekly)
on:
  schedule:
    - cron: '0 20 * * 1'  # Every Monday 8PM UTC (after NASS Monday release)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Fetch crop progress data
        run: python commodity-markets-deploy_2/scripts/fetch_crop_progress.py
        env:
          OUTPUT_DIR: commodity-markets-deploy_2/data
          NASS_API_KEY: ${{ secrets.NASS_API_KEY }}
      - name: Commit and push
        run: |
          cd commodity-markets-deploy_2
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/crop_progress.json
          git diff --cached --quiet || git commit -m "Update crop progress data $(date -u +%Y-%m-%d)"
          git push
