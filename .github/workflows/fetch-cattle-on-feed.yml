name: Fetch Cattle on Feed

on:
  schedule:
    # Cattle on Feed report released around 3rd Friday of each month @ 3:00 PM ET
    # Run next morning (Saturday) at 6 AM ET to catch it
    - cron: '0 10 * * 6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch cattle on feed
        env:
          NASS_API_KEY: ${{ secrets.NASS_API_KEY }}
        run: python commodity-markets-deploy_2/scripts/fetch_cattle_on_feed.py

      - name: Commit and push
        run: |
          cd commodity-markets-deploy_2
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update cattle on feed $(date -u +%Y-%m-%d)"
            git pull --rebase origin main
            git push
          fi
