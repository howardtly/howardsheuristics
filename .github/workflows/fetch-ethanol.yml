name: Fetch Ethanol (Weekly)
on:
  schedule:
    - cron: '30 14 * * 3'  # Wednesdays 10:30 AM ET / 9:30 AM CT
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install xlrd
      - name: Fetch ethanol data
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        run: python commodity-markets-deploy_2/scripts/fetch_ethanol.py
      - name: Commit and push
        run: |
          cd commodity-markets-deploy_2
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ethanol.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update ethanol data $(date -u +%Y-%m-%d)"
            git pull --rebase origin main
            git push
          fi
