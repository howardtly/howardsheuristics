name: Fetch Oilseed Crushing (Monthly)
on:
  schedule:
    - cron: '0 20 2 * *'  # 2nd of each month, 8PM UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Fetch oilseed crushing data
        env:
          NASS_API_KEY: ${{ secrets.NASS_API_KEY }}
        run: python commodity-markets-deploy_2/scripts/fetch_oilseed_crushing.py
      - name: Commit
        run: |
          cd commodity-markets-deploy_2
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/oilseed_crushing.json
          git diff --cached --quiet || git commit -m "Update oilseed crushing data $(date -u +%Y-%m-%d)"
          git push
