name: Fetch Drought Data (Weekly)
on:
  schedule:
    - cron: '0 18 * * 4'  # Every Thursday 6PM UTC (after Drought Monitor release)
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Fetch drought data
        run: python commodity-markets-deploy_2/scripts/fetch_drought.py
        env:
          OUTPUT_DIR: commodity-markets-deploy_2/data
      - name: Commit and push
        run: |
          cd commodity-markets-deploy_2
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/drought.json
          git diff --cached --quiet || git commit -m "Update drought data $(date -u +%Y-%m-%d)"
          git push
