name: Update WASDE (Monthly)

on:
  schedule:
    - cron: '0 18 12-14 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-wasde:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install xlrd
        run: pip install xlrd

      - name: Run WASDE update
        run: python commodity-markets-deploy_2/scripts/fetch_wasde_update.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update WASDE $(date -u +%Y-%m-%d)"
            git push
          fi
