name: Fetch Ethanol (Weekly)
on:
  schedule:
    - cron: '0 18 * * 3'  # Wednesdays 6PM UTC (after EIA publishes)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Fetch ethanol data
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        run: python commodity-markets-deploy_2/scripts/fetch_ethanol.py
      - name: Commit
        run: |
          cd commodity-markets-deploy_2
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/ethanol.json
          git diff --cached --quiet || git commit -m "Update ethanol data $(date -u +%Y-%m-%d)"
          git push
