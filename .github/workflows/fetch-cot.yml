name: Fetch COT Data (Weekly)
on:
  schedule:
    - cron: '30 19 * * 5'  # Fridays 3:30 PM ET (CFTC release time)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-cot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Fetch COT data
        run: python commodity-markets-deploy_2/scripts/fetch_cot.py
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update COT data $(date -u +%Y-%m-%d)"
            git push
          fi
